name: ticket_wallet
description: A digital ticket wallet app for Android to collect and manage PDF tickets using Supabase.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.4
  
  # File handling
  file_picker: ^6.0.0
  pdf: ^3.10.0
  
  # URL launcher for PDF
  url_launcher: ^6.2.0
  
  # UI
  flutter_svg: ^2.0.0
  cached_network_image: ^3.3.0
  
  # State management
  provider: ^6.1.0
  
  # Utilities
  intl: ^0.19.0
  path_provider: ^2.1.0
  permission_handler: ^11.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
          weight: 700
